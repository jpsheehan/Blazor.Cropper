name: publish to nuget
on:
  push:
    branches:
      - master
jobs:
  publish:
    name: build, pack & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Check out Repo
      uses: actions/checkout@v2

    - name: Setup dotnet
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore Blazor.Cropper/Blazor.Cropper.csproj
    - name: Build project
      run: dotnet build Blazor.Cropper/Blazor.Cropper.csproj --no-restore --configuration Release
    - name: Publish to Nuget
      run: dotnet nuget push Blazor.Cropper/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
    - name: publish package to GitHub
      run: dotnet nuget push Blazor.Cropper/bin/Release/*.nupkg --api-key ${{secrets.GITHUB_TOKEN}} --source "https://nuget.pkg.github.com/jpsheehan/index.json" --skip-duplicate
